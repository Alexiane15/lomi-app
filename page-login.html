<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Lomi — Connexion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0b0f0e;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;display:flex;justify-content:center}

.app{
  width:100%;max-width:390px;min-height:100%;
  background:#0b0f0e;
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
  padding-top:env(safe-area-inset-top);
  padding-bottom:calc(48px + env(safe-area-inset-bottom));
}

/* Bokeh */
.bk1{position:absolute;top:-40px;right:-60px;pointer-events:none;z-index:0;
  width:300px;height:300px;
  background:radial-gradient(ellipse 300px 300px at 60% 40%, rgba(26,255,170,.14) 0%, transparent 58%)}
.bk2{position:absolute;bottom:60px;left:-80px;pointer-events:none;z-index:0;
  width:260px;height:260px;
  background:radial-gradient(ellipse 260px 260px at 40% 60%, rgba(74,176,255,.1) 0%, transparent 58%)}

/* Topbar */
.topbar{height:56px;flex-shrink:0;display:flex;align-items:center;padding:0 16px;gap:12px;position:relative;z-index:1}
.back-btn{width:34px;height:34px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:rgba(255,255,255,.7);user-select:none;transition:background .15s}
.back-btn:active{background:rgba(255,255,255,.14)}

/* Content */
.content{flex:1;overflow-y:auto;padding:0 24px 48px;scrollbar-width:none;position:relative;z-index:1}
.content::-webkit-scrollbar{display:none}

/* Header */
.header{padding:24px 0 32px}
.logo{font-size:28px;font-weight:800;color:#1affaa;letter-spacing:-1px;margin-bottom:10px}
.header-title{font-size:26px;font-weight:700;color:#f4f2ed;letter-spacing:-.5px;line-height:1.2;margin-bottom:6px}
.header-sub{font-size:14px;color:rgba(255,255,255,.4);line-height:1.4}

/* Form */
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.4);margin-bottom:6px;display:block}
.form-input{
  width:100%;height:50px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;
  padding:0 16px;
  font-size:15px;color:#fff;
  font-family:inherit;outline:none;
  transition:border-color .2s,background .2s;
}
.form-input::placeholder{color:rgba(255,255,255,.25)}
.form-input:focus{border-color:rgba(26,255,170,.4);background:rgba(255,255,255,.08)}

/* Forgot */
.forgot{text-align:right;margin-top:6px}
.forgot a{font-size:12px;color:rgba(26,255,170,.6);text-decoration:none}

/* Buttons */
.btn-primary{
  width:100%;height:52px;
  background:#1affaa;border:none;border-radius:14px;
  font-size:15px;font-weight:800;color:#071510;
  cursor:pointer;margin-top:20px;
  transition:opacity .2s;
}
.btn-primary:active{opacity:.85}

.sep{display:flex;align-items:center;gap:12px;margin:20px 0}
.sep-line{flex:1;height:1px;background:rgba(255,255,255,.08)}
.sep-txt{font-size:12px;color:rgba(255,255,255,.3);font-weight:600}

.btn-outline{
  width:100%;height:52px;
  background:transparent;
  border:1.5px solid rgba(255,255,255,.15);border-radius:14px;
  font-size:15px;font-weight:700;color:rgba(255,255,255,.7);
  cursor:pointer;
  transition:border-color .2s,background .2s;
}
.btn-outline:active{background:rgba(255,255,255,.05)}

/* RGPD note */
.rgpd{
  display:flex;align-items:flex-start;gap:8px;
  margin-top:24px;padding:12px 14px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;
}
.rgpd-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.rgpd-text{font-size:11px;color:rgba(255,255,255,.35);line-height:1.5}
.rgpd-text strong{color:rgba(255,255,255,.5)}

/* ── DM Mono for titles & subtitles ── */
.section-title,.missions-title,.suivi-section-title,.context-card-title,
.fsh-section,.card-title,.ob-title,.ob-subtitle,
.phase-badge-chip,.fab-menu-header,.fsh-title{
  font-family:"DM Mono",monospace;
  font-weight:400;
}

/* ════════════════════════════════════
   DESIGN SYSTEM OVERRIDE — Light Neutral
   ════════════════════════════════════ */
body{background:#2d2d2d;color:#eeeeee}
.app{background:#2d2d2d}
/* Status bar */
.sbar{background:#2d2d2d}
.sbar-time{color:#ffffff}
.sig b{background:#111111}
.wifi-icon::before,.wifi-icon::after{border-color:#eeeeee}
.wifi-dot{background:#111111}
.batt-icon{border-color:rgba(238,238,238,.55)}
.batt-icon::after{background:rgba(17,17,17,.35)}
.batt-fill{background:#111111}
/* Top bar / back buttons */
.top-bar{background:#2d2d2d;border-bottom-color:rgba(0,0,0,.07)}
.back-btn{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.09);color:rgba(238,238,238,.55)}
.topbar{background:#2d2d2d}
.topbar-title{color:#eeeeee}
.top-title{color:#eeeeee}
.bookmark-btn{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.09);color:rgba(238,238,238,.55)}
/* Cards */
.card{background:#383838;border-color:rgba(255,255,255,.08)}
.card-title{color:rgba(238,238,238,.4)}
/* Tips */
.tip-amber{background:rgba(179,101,0,.06);border-color:rgba(179,101,0,.2)}
.tip-green{background:rgba(26,92,58,.06);border-color:rgba(26,92,58,.18)}
.tip-blue{background:rgba(42,90,156,.06);border-color:rgba(42,90,156,.18)}
.tip-purple{background:rgba(120,50,180,.06);border-color:rgba(120,50,180,.18)}
.tip-amber .tip-tag{color:rgba(179,101,0,.85)}
.tip-green .tip-tag{color:rgba(26,92,58,.85)}
.tip-blue .tip-tag{color:rgba(42,90,156,.85)}
.tip-purple .tip-tag{color:rgba(120,50,180,.85)}
.tip .tip-t{color:rgba(238,238,238,.65)}
.tip-card{background:#383838;border-color:rgba(42,90,156,.15)}
.tip-text{color:rgba(238,238,238,.65)}
.tip-text strong{color:#eeeeee}
/* Buttons */
.cta-btn{background:#111111;color:#ffffff;border-radius:100px}
.btn-primary{background:rgba(26,92,58,.1);border-color:rgba(26,92,58,.35);color:#1a5c3a}
.btn-secondary{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);color:rgba(238,238,238,.5)}
/* Section headings */
.section-head{color:rgba(238,238,238,.4)}
.stat-heading{color:#eeeeee}
/* Overlays / sheets */
.overlay{background:rgba(0,0,0,.4)}
.sheet{background:#faf9f7}
.sheet-handle{background:rgba(255,255,255,.1)}
.sheet-title{color:#eeeeee}
.sheet-sub{color:rgba(238,238,238,.4)}
.grp-title{color:rgba(238,238,238,.45)}
.grp-note{color:rgba(238,238,238,.35)}
.sheet-close{background:rgba(255,255,255,.07);color:rgba(238,238,238,.55)}
/* Chips */
.chip-red{background:rgba(192,57,43,.08);border-color:rgba(192,57,43,.25);color:#c0392b}
.chip-green{background:rgba(26,92,58,.08);border-color:rgba(26,92,58,.22);color:#1a5c3a}
/* Hero badge */
.hero-badge{background:rgba(26,92,58,.12);border-color:rgba(26,92,58,.3);color:#1a5c3a}
.hero-badge.mod{background:rgba(179,101,0,.12);border-color:rgba(179,101,0,.3);color:#b36500}
.hero-badge.av{background:rgba(192,57,43,.12);border-color:rgba(192,57,43,.3);color:#c0392b}
.hero-name{color:#eeeeee}
.hero-cat{color:rgba(238,238,238,.5)}
.hero-emoji-wrap{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.09)}
/* FODMAP bars */
.fodmap-bar-bg{background:rgba(255,255,255,.08)}
.fodmap-name{color:#eeeeee}
.lvl-low{color:#1a5c3a}
.lvl-mod{color:#b36500}
.lvl-high{color:#c0392b}
/* Portion */
.portion-emoji-big{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.09)}
.portion-qty{color:#eeeeee}
.portion-unit{color:rgba(238,238,238,.55)}
.portion-tip{color:rgba(238,238,238,.5)}
/* Similar items */
.similar-item{background:rgba(255,255,255,.04);border-color:rgba(0,0,0,.06)}
.similar-item:hover{background:rgba(255,255,255,.07)}
.similar-emoji{background:rgba(255,255,255,.06)}
.similar-name{color:#eeeeee}
.similar-badge{background:rgba(26,92,58,.1);border-color:rgba(26,92,58,.25);color:#1a5c3a}
/* Phase cards in food detail */
.phase-card.ok{background:#1a5c3a;box-shadow:none}
.phase-card.mod{background:#b36500;box-shadow:none}
.phase-card.av{background:#c0392b;box-shadow:none}
/* Log form */
.log-q{color:#eeeeee}
.check-q{color:#eeeeee}
.check-opt{border-color:rgba(0,0,0,.1);color:rgba(238,238,238,.5)}
.check-opt.sel{background:rgba(26,92,58,.13);border-color:rgba(26,92,58,.45);color:#1a5c3a}
.btn-submit{background:#111111;color:#ffffff;border-radius:100px}
.success .s-title{color:#eeeeee}
.success .s-sub{color:rgba(238,238,238,.45)}

</style>
</head>
<body>
<div class="app">

  <div class="bk1"></div>
  <div class="bk2"></div>

  <div class="topbar">
    <div class="back-btn" onclick="history.back()">‹</div>
  </div>

  <div class="content">

    <div class="header">
      <div class="logo">lomi</div>
      <div class="header-title">Bienvenue sur lomi</div>
      <div class="header-sub">Connectez-vous ou créez votre profil patient</div>
    </div>

    <div class="form-group">
      <label class="form-label">Adresse e-mail</label>
      <input class="form-input" type="email" placeholder="votre@email.com" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input class="form-input" type="password" placeholder="••••••••" autocomplete="current-password"/>
      <div class="forgot"><a href="#">Mot de passe oublié ?</a></div>
    </div>

    <button class="btn-primary" onclick="location.href='index.html'">Se connecter</button>

    <div class="sep">
      <div class="sep-line"></div>
      <div class="sep-txt">ou</div>
      <div class="sep-line"></div>
    </div>

    <button class="btn-outline" onclick="location.href='page-signup.html'">Créer un compte</button>

    <div class="rgpd">
      
      <div class="rgpd-text">
        Vos données sont hébergées sur <strong>serveur HDS certifié</strong> · Conformité <strong>RGPD</strong> garantie · Aucune donnée partagée sans votre consentement
      </div>
    </div>

  </div>

</div>
</body>
</html>
