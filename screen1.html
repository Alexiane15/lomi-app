<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393, initial-scale=1.0" />
  <title>Lomi — Carnet</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #232323;
      --pampas: #f4f2ed;
      --pampas-34: rgba(244,242,237,0.34);
      --pampas-50: rgba(244,242,237,0.50);
      --spring-green: #1affaa;
      --magenta: #d030ff;
      --blue: rgba(74,176,255,1);
      --blue-20: rgba(74,176,255,0.2);
      --purple-20: rgba(184,56,230,0.2);
      --purple-30: rgba(208,48,255,0.2);
      --card-from: rgba(82,80,80,0.1);
      --border: rgba(255,255,255,0.1);
      --white-40: rgba(255,255,255,0.4);
      --white-50: rgba(255,255,255,0.5);
      --white-80: rgba(255,255,255,0.8);
    }

    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: -apple-system, 'SF Pro Text', 'Inter', sans-serif;
    }

    .phone {
      width: 393px;
      min-height: 852px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* ── Status bar ── */
    .status-bar {
      height: 60px;
      width: 100%;
      position: relative;
      flex-shrink: 0;
    }
    .status-time {
      position: absolute;
      left: 27px;
      top: 20px;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.4px;
    }
    .status-icons {
      position: absolute;
      right: 16px;
      top: 22px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-icons img { height: 12px; width: auto; }
    .battery-img { height: 13px !important; }
    .dynamic-island {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 12px;
      width: 122px;
      height: 36px;
      background: #000;
      border-radius: 32px;
    }

    /* ── Nav ── */
    .nav {
      display: flex;
      gap: 12px;
      align-items: center;
      overflow: hidden;
      padding: 0 12px;
      height: 38px;
      margin-top: 26px;
    }
    .nav-item {
      font-size: 32px;
      font-weight: 300;
      color: #fff;
      white-space: nowrap;
      line-height: 1;
    }
    .nav-item.inactive { color: rgba(255,255,255,0.4); }

    /* ── Content ── */
    .content {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 16px;
    }

    /* ── Score card ── */
    .score-card {
      background: linear-gradient(180deg, rgba(82,80,80,0.1) 0%, rgba(184,56,230,0.2) 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px 16px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .score-ring {
      position: relative;
      width: 90px;
      height: 90px;
      flex-shrink: 0;
    }
    .score-ring svg {
      width: 90px;
      height: 90px;
      transform: rotate(-90deg);
    }
    .score-ring-track {
      fill: none;
      stroke: rgba(255,255,255,0.12);
      stroke-width: 6;
    }
    .score-ring-fill {
      fill: none;
      stroke: url(#ringGradient);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 245;
      stroke-dashoffset: 70;
    }
    .score-text {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .score-number {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }
    .score-denom {
      font-size: 14px;
      font-weight: 400;
      color: var(--white-80);
      line-height: 1.2;
    }
    .score-info { display: flex; flex-direction: column; gap: 4px; padding: 6px 0; justify-content: center; }
    .score-label { font-size: 14px; font-weight: 300; color: var(--white-50); }
    .score-mood { font-size: 16px; font-weight: 700; color: var(--pampas); }

    /* ── Calendar section ── */
    .calendar-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .section-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      height: 22px;
    }
    .nav-arrows {
      display: flex;
      gap: 8px;
    }
    .nav-arrow {
      font-size: 18px;
      color: var(--pampas-34);
      font-family: Arial, sans-serif;
      cursor: pointer;
      padding: 0 2px;
    }

    .calendar {
      background: linear-gradient(180deg, rgba(82,80,80,0.1) 0%, rgba(74,176,255,0.2) 100%);
      border-radius: 24px;
      padding: 16px 10px;
      display: flex;
      align-items: stretch;
      height: 238px;
    }
    .cal-col {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      flex: 1;
    }
    .cal-col.month-col {
      flex: 0 0 auto;
      width: 28px;
      border-right: 0.5px solid rgba(255,255,255,0.3);
      padding-right: 4px;
      align-items: flex-end;
      margin-right: 8px;
    }
    .cal-col:not(.month-col):not(:last-child) {
      border-right: 0.5px solid rgba(255,255,255,0.3);
    }
    .month-label {
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      letter-spacing: 0.5px;
    }
    .cal-cell {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .cal-cell.empty { color: transparent; }
    .cal-cell.selected::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
      background: rgba(74,176,255,0.4);
      border-radius: 4px;
    }
    .cal-cell span { position: relative; z-index: 1; }

    /* ── Bonne journée pill ── */
    .day-pill {
      background: linear-gradient(180deg, rgba(82,80,80,0.1) 0%, rgba(74,176,255,0.2) 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 16px;
    }
    .day-pill-text {
      font-size: 15.3px;
      font-weight: 700;
      color: var(--pampas);
      letter-spacing: -0.3px;
    }

    /* ── Tendances ── */
    .tendances-section { display: flex; flex-direction: column; gap: 4px; }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--pampas);
    }
    .tendances-card {
      background: linear-gradient(180deg, rgba(82,80,80,0.1) 0%, rgba(208,48,255,0.2) 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px 16px 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chart-area {
      position: relative;
      height: 70px;
      width: 100%;
    }
    .chart-area svg {
      width: 100%;
      height: 100%;
    }
    .chart-x-labels {
      display: flex;
      justify-content: space-between;
      padding: 0 1px;
    }
    .chart-x-label {
      font-size: 10px;
      color: var(--white-40);
      font-weight: 400;
    }
    .chart-legend {
      display: flex;
      gap: 14px;
      padding-top: 2px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot {
      width: 18px;
      height: 2px;
      border-radius: 1px;
      flex-shrink: 0;
    }
    .legend-dot.green {
      background: var(--spring-green);
      box-shadow: 0 0 4px rgba(26,255,170,0.4);
    }
    .legend-dot.purple { background: var(--magenta); }
    .legend-label { font-size: 10px; color: #fff; font-weight: 400; }
  </style>
</head>
<body>
<div class="phone">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="dynamic-island"></div>
    <div class="status-icons">
      <img src="assets/signal.png" alt="signal" />
      <img src="assets/wifi.png" alt="wifi" />
      <img src="assets/battery.png" alt="battery" class="battery-img" />
    </div>
  </div>

  <!-- Nav -->
  <nav class="nav">
    <span class="nav-item">Carnet</span>
    <span class="nav-item inactive">Aliments</span>
    <span class="nav-item inactive">Statistiques</span>
  </nav>

  <!-- Content -->
  <div class="content">

    <!-- Score Card -->
    <div class="score-card">
      <div class="score-ring">
        <svg viewBox="0 0 90 90">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#b838e6"/>
              <stop offset="100%" stop-color="#ff3fa4"/>
            </linearGradient>
          </defs>
          <circle class="score-ring-track" cx="45" cy="45" r="39"/>
          <circle class="score-ring-fill" cx="45" cy="45" r="39"/>
        </svg>
        <div class="score-text">
          <div class="score-number">7.2</div>
          <div class="score-denom">/10</div>
        </div>
      </div>
      <div class="score-info">
        <span class="score-label">Bien être</span>
        <span class="score-mood">Bonne journée</span>
      </div>
    </div>

    <!-- Calendar section -->
    <div class="calendar-section">
      <div class="section-header">
        <div class="nav-arrows">
          <span class="nav-arrow">‹</span>
          <span class="nav-arrow">›</span>
        </div>
      </div>

      <div class="calendar">
        <!-- Month label col -->
        <div class="cal-col month-col">
          <span class="month-label">juin</span>
        </div>
        <!-- Col 1: 1,8,15,22,29 -->
        <div class="cal-col">
          <div class="cal-cell"><span>1</span></div>
          <div class="cal-cell"><span>8</span></div>
          <div class="cal-cell"><span>15</span></div>
          <div class="cal-cell"><span>22</span></div>
          <div class="cal-cell"><span>29</span></div>
        </div>
        <!-- Col 2: 2,9,16,23,30 -->
        <div class="cal-col">
          <div class="cal-cell"><span>2</span></div>
          <div class="cal-cell"><span>9</span></div>
          <div class="cal-cell"><span>16</span></div>
          <div class="cal-cell"><span>23</span></div>
          <div class="cal-cell"><span>30</span></div>
        </div>
        <!-- Col 3: 3,10,17,24 -->
        <div class="cal-col">
          <div class="cal-cell"><span>3</span></div>
          <div class="cal-cell"><span>10</span></div>
          <div class="cal-cell"><span>17</span></div>
          <div class="cal-cell"><span>24</span></div>
          <div class="cal-cell empty"><span></span></div>
        </div>
        <!-- Col 4: 4,11,18,25 -->
        <div class="cal-col">
          <div class="cal-cell"><span>4</span></div>
          <div class="cal-cell"><span>11</span></div>
          <div class="cal-cell"><span>18</span></div>
          <div class="cal-cell"><span>25</span></div>
          <div class="cal-cell empty"><span></span></div>
        </div>
        <!-- Col 5: 5,12(selected),19,26 -->
        <div class="cal-col">
          <div class="cal-cell"><span>5</span></div>
          <div class="cal-cell selected"><span>12</span></div>
          <div class="cal-cell"><span>19</span></div>
          <div class="cal-cell"><span>26</span></div>
          <div class="cal-cell empty"><span></span></div>
        </div>
        <!-- Col 6: 6,13,20,27 -->
        <div class="cal-col">
          <div class="cal-cell"><span>6</span></div>
          <div class="cal-cell"><span>13</span></div>
          <div class="cal-cell"><span>20</span></div>
          <div class="cal-cell"><span>27</span></div>
          <div class="cal-cell empty"><span></span></div>
        </div>
        <!-- Col 7: 7,14,21,28 -->
        <div class="cal-col">
          <div class="cal-cell"><span>7</span></div>
          <div class="cal-cell"><span>14</span></div>
          <div class="cal-cell"><span>21</span></div>
          <div class="cal-cell"><span>28</span></div>
          <div class="cal-cell empty"><span></span></div>
        </div>
      </div>
    </div>

    <!-- Bonne journée pill -->
    <div class="day-pill">
      <span class="day-pill-text">Bonne journée</span>
    </div>

    <!-- Tendances -->
    <div class="tendances-section">
      <span class="section-title">Tendances</span>
      <div class="tendances-card">
        <div class="chart-area">
          <svg viewBox="0 0 328 70" preserveAspectRatio="none">
            <!-- Green area fill -->
            <defs>
              <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#1affaa" stop-opacity="0.25"/>
                <stop offset="100%" stop-color="#1affaa" stop-opacity="0"/>
              </linearGradient>
              <linearGradient id="purpleFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#d030ff" stop-opacity="0.18"/>
                <stop offset="100%" stop-color="#d030ff" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <!-- Green area -->
            <path d="M0,55 C40,52 80,45 130,38 C180,31 230,22 270,15 C295,10 310,8 328,5 L328,70 L0,70 Z"
                  fill="url(#greenFill)"/>
            <!-- Green line -->
            <path d="M0,55 C40,52 80,45 130,38 C180,31 230,22 270,15 C295,10 310,8 328,5"
                  fill="none" stroke="#1affaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <!-- Purple area -->
            <path d="M0,18 C40,22 80,28 130,36 C180,44 230,52 270,58 C295,62 310,63 328,65 L328,70 L0,70 Z"
                  fill="url(#purpleFill)"/>
            <!-- Purple line -->
            <path d="M0,18 C40,22 80,28 130,36 C180,44 230,52 270,58 C295,62 310,63 328,65"
                  fill="none" stroke="#d030ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="chart-x-labels">
          <span class="chart-x-label">Jeu</span>
          <span class="chart-x-label">Ven</span>
          <span class="chart-x-label">Sam</span>
          <span class="chart-x-label">Dim</span>
          <span class="chart-x-label">Lun</span>
          <span class="chart-x-label">Mar</span>
          <span class="chart-x-label">Mer</span>
        </div>
        <div class="chart-legend">
          <div class="legend-item">
            <div class="legend-dot green"></div>
            <span class="legend-label">Bien-être</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot purple"></div>
            <span class="legend-label">Symptômes</span>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /phone -->
</body>
</html>
