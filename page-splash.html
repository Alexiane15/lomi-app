<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Lomi — Bienvenue</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0f0d;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;display:flex;justify-content:center}

.app{
  width:100%;max-width:390px;min-height:100%;
  background:#0a0f0d;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden;
  padding-top:env(safe-area-inset-top);
  padding-bottom:calc(48px + env(safe-area-inset-bottom));
}

/* Bokeh */
.bokeh{position:absolute;inset:0;pointer-events:none;z-index:0}
.bk1{position:absolute;width:340px;height:340px;top:-60px;right:-80px;
  background:radial-gradient(ellipse 340px 340px at 60% 40%, rgba(26,255,170,.18) 0%, transparent 58%)}
.bk2{position:absolute;width:280px;height:280px;bottom:80px;left:-60px;
  background:radial-gradient(ellipse 280px 280px at 40% 60%, rgba(74,176,255,.14) 0%, transparent 58%)}
.bk3{position:absolute;width:200px;height:200px;top:40%;right:20px;
  background:radial-gradient(ellipse 200px 200px at 50% 50%, rgba(26,255,170,.08) 0%, transparent 58%)}

/* Center block */
.center{display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;z-index:1;padding-top:80px}

.logo{font-size:52px;font-weight:800;color:#1affaa;letter-spacing:-2px;line-height:1}
.logo-sub{font-size:16px;color:rgba(255,255,255,.4);letter-spacing:-.1px;font-weight:500}

.monash-badge{
  margin-top:8px;
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:20px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  font-size:11px;color:rgba(255,255,255,.5);
}
.monash-dot{width:6px;height:6px;border-radius:50%;background:#1affaa;flex-shrink:0}

/* Illustration area */
.illus{width:240px;height:240px;position:relative;z-index:1;margin:0 auto}
.illus-ring{
  position:absolute;inset:0;
  border-radius:50%;
  border:1.5px solid rgba(26,255,170,.15);
}
.illus-ring-2{
  position:absolute;inset:20px;
  border-radius:50%;
  border:1.5px solid rgba(26,255,170,.1);
}
.illus-center{
  position:absolute;inset:40px;
  border-radius:50%;
  background:radial-gradient(ellipse 160px 160px at 50% 50%, rgba(26,255,170,.18) 0%, transparent 70%);
  display:flex;align-items:center;justify-content:center;
  font-size:60px;
}

/* Bottom block */
.bottom{display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;padding:0 24px;position:relative;z-index:1}

/* CHU badge */
.chu-badge{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:16px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  width:100%;
}
.chu-info{display:flex;flex-direction:column;gap:1px}
.chu-main{font-size:12px;font-weight:600;color:rgba(255,255,255,.7)}
.chu-sub{font-size:10px;color:rgba(255,255,255,.35)}

/* CTA */
.cta{
  width:100%;height:54px;
  background:#1affaa;border:none;border-radius:14px;
  font-size:16px;font-weight:800;color:#071510;
  cursor:pointer;letter-spacing:-.2px;
  transition:opacity .2s;
}
.cta:active{opacity:.85}

.already{font-size:13px;color:rgba(255,255,255,.35)}
.already a{color:rgba(26,255,170,.7);text-decoration:none}

/* ── DM Mono for titles & subtitles ── */
.section-title,.missions-title,.suivi-section-title,.context-card-title,
.hg-hi,.phase-name,.fsh-title,.fsh-section,.card-title,.ob-title,.ob-subtitle,
.phase-badge-chip,.fab-menu-header{
  font-family:"DM Mono",monospace;
}

/* ════════════════════════════════════
   DESIGN SYSTEM OVERRIDE — Light Neutral
   ════════════════════════════════════ */
body{background:#f0ece6;color:#111111}
.app{background:#f0ece6}
/* Status bar */
.sbar{background:#f0ece6}
.sbar-time{color:#111111}
.sig b{background:#111111}
.wifi-icon::before,.wifi-icon::after{border-color:#111111}
.wifi-dot{background:#111111}
.batt-icon{border-color:rgba(17,17,17,.5)}
.batt-icon::after{background:rgba(17,17,17,.35)}
.batt-fill{background:#111111}
/* Top bar / back buttons */
.top-bar{background:#f0ece6;border-bottom-color:rgba(0,0,0,.07)}
.back-btn{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.08);color:rgba(17,17,17,.5)}
.topbar{background:#f0ece6}
.topbar-title{color:#111111}
.top-title{color:#111111}
.bookmark-btn{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.08);color:rgba(17,17,17,.5)}
/* Cards */
.card{background:#ffffff;border-color:rgba(0,0,0,.07)}
.card-title{color:rgba(17,17,17,.35)}
/* Tips */
.tip-amber{background:rgba(179,101,0,.06);border-color:rgba(179,101,0,.2)}
.tip-green{background:rgba(26,92,58,.06);border-color:rgba(26,92,58,.18)}
.tip-blue{background:rgba(42,90,156,.06);border-color:rgba(42,90,156,.18)}
.tip-purple{background:rgba(120,50,180,.06);border-color:rgba(120,50,180,.18)}
.tip-amber .tip-tag{color:rgba(179,101,0,.85)}
.tip-green .tip-tag{color:rgba(26,92,58,.85)}
.tip-blue .tip-tag{color:rgba(42,90,156,.85)}
.tip-purple .tip-tag{color:rgba(120,50,180,.85)}
.tip .tip-t{color:rgba(17,17,17,.6)}
.tip-card{background:#ffffff;border-color:rgba(42,90,156,.15)}
.tip-text{color:rgba(17,17,17,.6)}
.tip-text strong{color:#111111}
/* Buttons */
.cta-btn{background:#111111;color:#ffffff;border-radius:100px}
.btn-primary{background:rgba(26,92,58,.1);border-color:rgba(26,92,58,.35);color:#1a5c3a}
.btn-secondary{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.09);color:rgba(17,17,17,.45)}
/* Section headings */
.section-head{color:rgba(17,17,17,.35)}
.stat-heading{color:#111111}
/* Overlays / sheets */
.overlay{background:rgba(0,0,0,.4)}
.sheet{background:#faf9f7}
.sheet-handle{background:rgba(0,0,0,.12)}
.sheet-title{color:#111111}
.sheet-sub{color:rgba(17,17,17,.35)}
.grp-title{color:rgba(17,17,17,.4)}
.grp-note{color:rgba(17,17,17,.3)}
.sheet-close{background:rgba(0,0,0,.06);color:rgba(17,17,17,.5)}
/* Chips */
.chip-red{background:rgba(192,57,43,.08);border-color:rgba(192,57,43,.25);color:#c0392b}
.chip-green{background:rgba(26,92,58,.08);border-color:rgba(26,92,58,.22);color:#1a5c3a}
/* Hero badge */
.hero-badge{background:rgba(26,92,58,.12);border-color:rgba(26,92,58,.3);color:#1a5c3a}
.hero-badge.mod{background:rgba(179,101,0,.12);border-color:rgba(179,101,0,.3);color:#b36500}
.hero-badge.av{background:rgba(192,57,43,.12);border-color:rgba(192,57,43,.3);color:#c0392b}
.hero-name{color:#111111}
.hero-cat{color:rgba(17,17,17,.45)}
.hero-emoji-wrap{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.08)}
/* FODMAP bars */
.fodmap-bar-bg{background:rgba(0,0,0,.08)}
.fodmap-name{color:#111111}
.lvl-low{color:#1a5c3a}
.lvl-mod{color:#b36500}
.lvl-high{color:#c0392b}
/* Portion */
.portion-emoji-big{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.08)}
.portion-qty{color:#111111}
.portion-unit{color:rgba(17,17,17,.5)}
.portion-tip{color:rgba(17,17,17,.45)}
/* Similar items */
.similar-item{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.06)}
.similar-item:hover{background:rgba(0,0,0,.06)}
.similar-emoji{background:rgba(0,0,0,.05)}
.similar-name{color:#111111}
.similar-badge{background:rgba(26,92,58,.1);border-color:rgba(26,92,58,.25);color:#1a5c3a}
/* Phase cards in food detail */
.phase-card.ok{background:#1a5c3a;box-shadow:none}
.phase-card.mod{background:#b36500;box-shadow:none}
.phase-card.av{background:#c0392b;box-shadow:none}
/* Log form */
.log-q{color:#111111}
.check-q{color:#111111}
.check-opt{border-color:rgba(0,0,0,.1);color:rgba(17,17,17,.45)}
.check-opt.sel{background:rgba(26,92,58,.13);border-color:rgba(26,92,58,.45);color:#1a5c3a}
.btn-submit{background:#111111;color:#ffffff;border-radius:100px}
.success .s-title{color:#111111}
.success .s-sub{color:rgba(17,17,17,.4)}

</style>
</head>
<body>
<div class="app">

  <div class="bokeh">
    <div class="bk1"></div>
    <div class="bk2"></div>
    <div class="bk3"></div>
  </div>

  <div class="center">
    <div class="logo">lomi</div>
    <div class="logo-sub">Votre compagnon FODMAP</div>
    <div class="monash-badge">
      <div class="monash-dot"></div>
      Protocole Monash University certifié
    </div>
  </div>

  <div class="illus">
    <div class="illus-ring"></div>
    <div class="illus-ring-2"></div>
    <div class="illus-center"></div>
  </div>

  <div class="bottom">
    <div class="chu-badge">
      
      <div class="chu-info">
        <div class="chu-main">En partenariat avec le CHU de Bordeaux</div>
        <div class="chu-sub">Suivi médical supervisé · Protocole validé</div>
      </div>
    </div>

    <button class="cta" onclick="location.href='onboarding.html'">Commencer</button>
    <div class="already">Déjà un compte ? <a href="page-login.html">Se connecter</a></div>
  </div>

</div>
</body>
</html>
